name: Задача
description: Атомарная задача для агента-исполнителя
title: "<эпик>: <суть задачи>"
body:
  - type: textarea
    id: context
    attributes:
      label: Контекст
      description: Ссылки на docs/, номера решений Р*, связанные issue. Агент не знает того, чего нет здесь.
      placeholder: |
        См. docs/game/vision.md#распознавание, решения Р14, Р21.
        Блокируется #12.
    validations:
      required: true

  - type: textarea
    id: task
    attributes:
      label: Задача
      description: Что сделать. Один абзац, без размышлений.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Критерии приёмки
      description: Проверяемые утверждения. По ним ревьюер выносит вердикт.
      value: |
        - [ ]
        - [ ] npm test зелёный
        - [ ] npx tsc --noEmit чистый
    validations:
      required: true

  - type: textarea
    id: bounds
    attributes:
      label: Границы
      description: Что агент НЕ должен трогать. Самый важный раздел для предсказуемого PR.
      placeholder: "Не трогать: src/config.ts, всё вне src/recognition/"
    validations:
      required: true

  - type: dropdown
    id: model
    attributes:
      label: Модель
      options:
        - opus
        - sonnet
    validations:
      required: true
